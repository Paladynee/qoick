<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        .split {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 33.3333%;
            padding: 16px;
            box-sizing: border-box;
            border-right: 1px solid #ddd;
        }

        .right {
            width: 66.6667%;
            padding: 16px;
            box-sizing: border-box;
            overflow: auto;
        }

        .left input {
            font-family: monospace;
            display: block;
            margin-bottom: 8px;
            width: 100%;
        }

        pre {
            font-family: monospace;
            white-space: pre-wrap;
        }

        label {
            display: block;
            margin-bottom: 4px;
        }
    </style>

    <div class="split">
        <div class="left">
            <label>r = <input type="text" id="r" value="0" /></label>
            <label>g = <input type="text" id="g" value="0" /></label>
            <label>b = <input type="text" id="b" value="0" /></label>
            <label>a = <input type="text" id="a" value="0" /></label>
            <label>mult = <input type="text" id="mult" value="0300_0700_0005_000b" /></label>
        </div>

        <div class="right">
            <div>mem =</div>
            <pre id="mem"></pre>
            <div>shuffled =</div>
            <pre id="le"></pre>
            <div>post_mult =</div>
            <pre id="post_mult"></pre>
            <div>to_le =</div>
            <pre id="to_le"></pre>
            <div>swap_bytes =</div>
            <pre id="swap_bytes"></pre>
            <div>fin =</div>
            <pre id="fin"></pre>
            <div>expected =</div>
            <pre id="expected"></pre>
        </div>
    </div>

    <script>
        const [
            r, g, b, a, mult,
            mem, shuf, post_mult, to_le, swap_bytes, fin, expected,
        ] = [
            'r', 'g', 'b', 'a', 'mult',
            'mem', 'le', 'post_mult', 'to_le', 'swap_bytes', 'fin', 'expected',
        ].map(id => document.getElementById(id));


        function renderNumber(bignum = 0n) {
            let string = bignum.toString(16).padStart(16, '0');
            string = string.slice(-16);
            let buf = "";
            for (let i = 0; i < 16; i++) {
                if (i !== 0 && i % 4 === 0) {
                    buf += "_";
                }
                buf += string[i];
            }
            // return `0x${buf} (orig: ${string})`;
            return `0x${buf}`;
        }

        function renderMem(bignum = 0n) {
            let string = bignum.toString(16).padStart(8, '0');
            string = string.slice(-16);
            let string_underscore = "";
            for (let i = 0; i < 8; i++) {
                if (i !== 0 && i % 2 === 0) {
                    string_underscore += " ";
                }
                string_underscore += string[i];
            }
            return string_underscore;
        }

        const U64_MAX = 0xffff_ffff_ffff_ffffn;
        // acts as a byte swap for a 64 bit integer.
        function bswap(bignum = 0n) {
            bignum = bignum & U64_MAX;
            return (
                ((bignum & 0x00000000000000FFn) << 56n) |
                ((bignum & 0x000000000000FF00n) << 40n) |
                ((bignum & 0x0000000000FF0000n) << 24n) |
                ((bignum & 0x00000000FF000000n) << 8n) |
                ((bignum & 0x000000FF00000000n) >> 8n) |
                ((bignum & 0x0000FF0000000000n) >> 24n) |
                ((bignum & 0x00FF000000000000n) >> 40n) |
                ((bignum & 0xFF00000000000000n) >> 56n)
            );
        }

        function duo(little, big, fn) {
            return `le = ${fn(little)}\nbe = ${fn(big)}`;
        }

        function updateOutput() {
            try {
                const r_val = BigInt(Math.trunc(r.value));
                const g_val = BigInt(Math.trunc(g.value));
                const b_val = BigInt(Math.trunc(b.value));
                const a_val = BigInt(Math.trunc(a.value));

                [r_val, g_val, b_val, a_val].forEach((val, idx) => {
                    if (val < 0n || val > 255n) {
                        throw new Error(`${["r", "g", "b", "a"][idx]} is out of range (0-255)`);
                    }
                });


                const little_mem = ((a_val << 24n) | (b_val << 16n) | (g_val << 8n) | r_val) & U64_MAX;
                const big_mem = ((r_val << 24n) | (g_val << 16n) | (b_val << 8n) | a_val) & U64_MAX;
                mem.textContent = duo(little_mem, big_mem, renderMem);

                const little_shuffled = (((little_mem & 0xff00_ff00n) << 32n) | (little_mem & 0x00ff_00ffn)) & U64_MAX;
                const big_shuffled = (((big_mem & 0xff00_ff00n) << 32n) | (big_mem & 0x00ff_00ffn)) & U64_MAX;
                shuf.textContent = duo(little_shuffled, big_shuffled, renderNumber);

                const mult_str = mult.value.replace(/_/g, '');
                if (!/^[0-9a-fA-F]+$/.test(mult_str)) {
                    throw new Error("Invalid hexadecimal number in mult");
                }

                const mult_parsed = BigInt('0x' + mult_str);
                if (mult_parsed < 0n || mult_parsed > 0xffff_ffff_ffff_ffffn) {
                    throw new Error("mult is out of range (0-0xffff_ffff_ffff_ffff)");
                }

                const le_multiplied = (little_shuffled * mult_parsed) & U64_MAX;
                const be_multiplied = (big_shuffled * mult_parsed) & U64_MAX;
                post_mult.textContent = duo(le_multiplied, be_multiplied, renderNumber);

                const le_bswap = le_multiplied;
                const be_bswap = bswap(be_multiplied) & U64_MAX;
                to_le.textContent = duo(le_bswap, be_bswap, renderNumber);

                const le_swap_bytes = bswap(le_bswap) & U64_MAX;
                const be_swap_bytes = bswap(be_bswap) & U64_MAX;
                swap_bytes.textContent = duo(le_swap_bytes, be_swap_bytes, renderNumber);

                const res_le = le_swap_bytes & 63n;
                const res_be = be_swap_bytes & 63n;

                const le_final = res_le.toString(16).padStart(2, '0');
                const be_final = res_be.toString(16).padStart(2, '0');
                fin.textContent = duo(le_final, be_final, x => {
                    const hex = x.toString(16).padStart(2, '0');
                    const dec = parseInt(hex, 16);
                    return `0x${hex} (${dec})`;
                });
                const e = (r_val * 3n + g_val * 5n + b_val * 7n + a_val * 11n) & 63n;
                expected.textContent = `0x${e.toString(16).padStart(2, '0')} (${e})`;
            } catch (e) {
                fin.textContent = 'Error: ' + e.message;
            }
        }

        document.getElementById('r').addEventListener('input', updateOutput);
        document.getElementById('g').addEventListener('input', updateOutput);
        document.getElementById('b').addEventListener('input', updateOutput);
        document.getElementById('a').addEventListener('input', updateOutput);
        document.getElementById('mult').addEventListener('input', updateOutput);
        updateOutput();
    </script>
</body>

</html>
